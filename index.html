<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>API_TEST</title>
        <link rel="stylesheet" href="style.css">
        <script src="main.js"></script>
    </head>
    <body onload="testAPI()">
        <diV class="API-Header">
            <h1>Welcome to USER_API test</h1>
            <p>This is a simple web application for tests.</p>
            <a href="http://localhost:8080/swagger-ui/index.html#/" style="color: #49cc90; font-size: 18px;" target="_blank">Swagger docs</a>
        </diV>
        
        <div class="API-TESTOptions">
            <div class="endpoint get">
                <div class="endpoint-get-header">
                    <span class="method-get">GET</span>

                    <span class="route">/status</span>
                </div>
                <div class="endpoint-body">
                    <form>
                        <span id="response" class="Request-Response"></span>
                    </form>  
                </div>
            </div>

            <div class="endpoint post">
                <div class="endpoint-post-header">

                    <span class="method-post">POST</span>

                    <span class="route">/register</span>

                </div>

                <div class="endpoint-body">

                    <form onsubmit="event.preventDefault(); registerAPI();">
                        <input type="text" required id="Username_R" placeholder="Name">

                        <input type="email" required id="Email_R"placeholder="Email">

                        <input type="password" required minlength="6" id="Password_R"placeholder="Password">

                        <button>Execute</button>

                        <span id="register-response" class="Request-Response">Request Response: </span>
                    </form>
                    

                </div>
            </div>

            <div class="endpoint post">
                <div class="endpoint-post-header">

                    <span class="method-post">POST</span>

                    <span class="route">/login</span>

                </div>

                <div class="endpoint-body">

                    <form onsubmit="event.preventDefault(); loginAPI();">
                        <input type="email" id="Username_L" required placeholder="Email">

                        <input type="password" id="Password_L" required placeholder="Password">

                        <button>Execute</button>

                        <span id="login-response" class="Request-Response">Request Response: </span>
                    </form>

                    

                </div>
            </div>
        </div>
    </body>
</html>
