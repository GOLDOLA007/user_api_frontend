<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>API_TEST</title>
        <link rel="stylesheet" href="style.css">
        <script src="main.js"></script>
    </head>
    <body onload="testAPI()">
        <diV class="API-Header">
            <h1>Welcome to USER_API test</h1>
            <p>This is a simple web application for tests.</p>
            <a href="http://localhost:8080/swagger-ui/index.html#/" style="color: black; font-size: 18px;" target="_blank">Swagger docs</a>
        </diV>
        
        <div class="API-TESTOptions">
            <div class="API-Response">
                <h2>API Response:</h2>
                STATUS:<span id="response"></span>
                <span id="counter"></span>
            </div>

            <div class="endpoint post">
                <div class="endpoint-header">

                    <span class="method">POST</span>

                    <span class="route">/register</span>

                </div>

                <div class="endpoint-body">

                    <input type="text" id="Username_R" placeholder="Name">

                    <input type="email" id="Email_R"placeholder="Email">

                    <input type="password" id="Password_R"placeholder="Password">

                    <button onclick="registerAPI()">Execute</button>

                </div>
            </div>

            <div class="endpoint post">
                <div class="endpoint-header">

                    <span class="method">POST</span>

                    <span class="route">/login</span>

                </div>

                <div class="endpoint-body">

                    <input type="email" id="Username_L" placeholder="Email">

                    <input type="password" id="Password_L" placeholder="Password">

                    <button>Execute</button>

                </div>
            </div>
        </div>
    </body>
</html>
